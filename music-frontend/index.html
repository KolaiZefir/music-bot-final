<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎵 Music Player</h1>
        
        <div class="player">
            <div class="cover">
                <img id="album-art" src="https://via.placeholder.com/300" alt="Album cover">
            </div>
            
            <div class="track-info">
                <h2 id="track-title">Название трека</h2>
                <p id="track-artist">Исполнитель</p>
            </div>
            
            <div class="controls">
                <button id="prev" class="control-btn">⏮️</button>
                <button id="play-pause" class="control-btn play-btn">▶️</button>
                <button id="next" class="control-btn">⏭️</button>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress"></div>
                </div>
                <div class="time">
                    <span id="current-time">0:00</span> / <span id="duration">0:00</span>
                </div>
            </div>
            
            <div class="volume-container">
                <span>🔊</span>
                <input type="range" id="volume" min="0" max="100" value="70">
            </div>
        </div>
        
        <div class="search">
            <input type="text" id="search-input" placeholder="Поиск треков...">
            <button id="search-btn">🔍 Найти</button>
        </div>
        
        <div class="tracks-list" id="tracks-list">
            <div class="loading">Загрузка треков...</div>
        </div>
    </div>
    
    <audio id="audio"></audio>
    <script src="script.js"></script>
</body>
</html>
